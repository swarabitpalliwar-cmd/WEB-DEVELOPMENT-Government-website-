<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Establish Scholar Registration Node</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="gov-header">
        <div class="nav-container"><a href="index.html" class="brand-logo">NDL<span>Portal</span></a></div>
    </header>

    <div class="auth-wrapper" style="max-width:550px;">
        <div style="text-align:center; margin-bottom:30px;">
            <h2 style="color:var(--primary-green);">Scholar Registration Engine</h2>
            <p style="color:#777; font-size:0.85rem;">Configure and provision an authorization state signature entry node.</p>
        </div>

        <form id="registerForm">
            <div class="form-group">
                <label>Primary Identity Email Address Target</label>
                <input type="email" id="email" class="form-control" required placeholder="user@domain.edu">
            </div>
            <div class="form-group">
                <label>Establish Key Password</label>
                <input type="password" id="password" class="form-control" required placeholder="Minimum 6 characters">
            </div>
            <div class="form-group">
                <label>Verify Identity Key Password</label>
                <input type="password" id="confirmPassword" class="form-control" required placeholder="Re-enter parameters">
            </div>
            <button type="submit" class="gov-btn btn-orange" style="width:100%; margin-top:10px;">Initialize Allocation Sequence</button>
        </form>
        <div id="formFeedback"></div>
        <p style="text-align:center; font-size:0.85rem; margin-top:20px; color:#555;">Already registered? <a href="login.html" style="color:var(--primary-green); font-weight:bold; text-decoration:none;">Sign In Directly</a></p>
    </div>

    <script src="script.js"></script>
</body>
</html>
