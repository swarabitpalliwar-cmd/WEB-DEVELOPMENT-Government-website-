<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact NDL Portal Support</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="gov-header">
        <div class="nav-container">
            <a href="index.html" class="brand-logo">NDL<span>Portal</span></a>
            <ul class="nav-menu">
                <li><a href="index.html" class="nav-link">Home</a></li>
                <li><a href="courses.html" class="nav-link">Courses</a></li>
                <li><a href="contact.html" class="nav-link active">Contact</a></li>
                <li><a href="feedback.html" class="nav-link">Feedback</a></li>
            </ul>
        </div>
    </header>

    <div class="container">
        <div class="section-title">
            <h2>Institutional Communication Center</h2>
            <div class="title-line"></div>
        </div>

        <div class="grid-2">
            <div style="background:white; padding:30px; border-radius:8px; box-shadow:var(--shadow-sm);">
                <h3 style="margin-bottom:20px;">Submit Support Inquiry</h3>
                <form id="contactForm">
                    <div class="form-group">
                        <label>Full Identity Name</label>
                        <input type="text" id="name" class="form-control" required placeholder="e.g. Dr. Rajesh Kumar">
                    </div>
                    <div class="form-group">
                        <label>Academic Email Address</label>
                        <input type="email" id="email" class="form-control" required placeholder="name@university.edu.in">
                    </div>
                    <div class="form-group">
                        <label>Detailed Inquiry Scope Text</label>
                        <textarea id="message" class="form-control" rows="4" required placeholder="Describe the system anomalies encountered..." style="resize:none;"></textarea>
                    </div>
                    <button type="submit" class="gov-btn btn-orange" style="width:100%;">Dispatch Communication Ticket</button>
                </form>
                <div id="contactFeedback"></div>
            </div>

            <div style="background:white; padding:30px; border-radius:8px; box-shadow:var(--shadow-sm); display:flex; flex-direction:column;">
                <h3>Central Coordinates HQ</h3>
                <p style="color:#666; font-size:0.9rem; margin:10px 0 20px;"><strong>Address:</strong> IIT Kharagpur Campus, Institutional Digital Core Hub, West Bengal - 721302.</p>
                <div style="flex:1; min-height:250px; border-radius:6px; overflow:hidden; box-shadow:var(--shadow-sm);">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3691.011883526938!2d87.30825317610012!3d22.3153835423547!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1m3!1s0x3a1d442371cf7d15%3A0x6b09337584cd803d!2sIndian%20Institute%20of%20Technology%20Kharagpur!5e0!3m2!1sen!2sin!4v1710000000000!5m2!1sen!2sin" style="width:100%; height:100%; border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
